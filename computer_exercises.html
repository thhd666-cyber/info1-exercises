<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>コンピュータと2進法 演習問題システム</title>
  <!-- Google Fonts: Inter & Outfit & Noto Sans JP -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* CSS変数によるデザインシステム定義 */
    :root {
      --bg-gradient-start: #0f172a;
      --bg-gradient-end: #020617;
      --card-bg: rgba(30, 41, 59, 0.7);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      
      --color-primary: #38bdf8;       /* ネオンブルー */
      --color-primary-glow: rgba(56, 189, 248, 0.35);
      --color-secondary: #c084fc;     /* ラベンダー */
      --color-secondary-glow: rgba(192, 132, 252, 0.3);
      --color-success: #4ade80;       /* エメラルド */
      --color-success-glow: rgba(74, 222, 128, 0.2);
      --color-error: #f87171;         /* コーラルレッド */
      --color-error-glow: rgba(248, 113, 113, 0.2);
      
      --font-outfit: 'Outfit', 'Noto Sans JP', sans-serif;
      --font-inter: 'Inter', 'Noto Sans JP', sans-serif;
      
      --shadow-premium: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ライトテーマの上書き */
    [data-theme="light"] {
      --bg-gradient-start: #f8fafc;
      --bg-gradient-end: #e2e8f0;
      --card-bg: rgba(255, 255, 255, 0.75);
      --card-border: rgba(15, 23, 42, 0.08);
      --text-main: #0f172a;
      --text-muted: #64748b;
      
      --color-primary: #0284c7;
      --color-primary-glow: rgba(2, 132, 199, 0.15);
      --color-secondary: #7e22ce;
      --color-secondary-glow: rgba(126, 34, 206, 0.1);
      --color-success: #16a34a;
      --color-success-glow: rgba(22, 163, 74, 0.1);
      --color-error: #dc2626;
      --color-error-glow: rgba(220, 38, 38, 0.1);
      
      --shadow-premium: 0 8px 32px 0 rgba(148, 163, 184, 0.18);
    }

    /* 基本リセット & アニメーション背景 */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-main);
      font-family: var(--font-inter);
      min-height: 100vh;
      overflow-x: hidden;
      padding: 2rem 1rem;
      position: relative;
      transition: background 0.5s ease, color 0.3s ease;
    }

    /* 背景の光るオーブ（装飾） */
    .bg-orbs {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.15;
      animation: float 20s infinite alternate ease-in-out;
    }

    .orb-1 {
      width: 400px;
      height: 400px;
      background: var(--color-primary);
      top: -100px;
      right: -100px;
    }

    .orb-2 {
      width: 500px;
      height: 500px;
      background: var(--color-secondary);
      bottom: -150px;
      left: -150px;
      animation-duration: 25s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 50px) scale(1.1); }
    }

    /* コンテナ */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      position: relative;
      z-index: 10;
    }

    /* ヘッダーエリア */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--card-border);
    }

    .brand {
      display: flex;
      flex-direction: column;
    }

    .brand h1 {
      font-family: var(--font-outfit);
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(to right, var(--color-primary), var(--color-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.25rem;
    }

    .brand p {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    /* コントロールボタン群 */
    .controls {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .btn {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text-main);
      padding: 0.6rem 1.2rem;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: var(--transition-smooth);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .btn:hover {
      background: var(--color-primary-glow);
      border-color: var(--color-primary);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px var(--color-primary-glow);
    }

    .btn-primary {
      background: var(--color-primary);
      color: #0f172a;
      border: none;
      font-weight: 600;
    }

    .btn-primary:hover {
      background: #7dd3fc;
      color: #0f172a;
      box-shadow: 0 4px 15px var(--color-primary-glow);
    }

    /* ダッシュボード (進捗状況) */
    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2.5rem;
    }

    .dash-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      box-shadow: var(--shadow-premium);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      transition: var(--transition-smooth);
    }

    .dash-card:hover {
      transform: translateY(-3px);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .dash-icon {
      width: 50px;
      height: 50px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      background: var(--color-primary-glow);
      color: var(--color-primary);
    }

    .dash-card.success .dash-icon {
      background: var(--color-success-glow);
      color: var(--color-success);
    }

    .dash-info {
      display: flex;
      flex-direction: column;
    }

    .dash-value {
      font-family: var(--font-outfit);
      font-size: 1.8rem;
      font-weight: 700;
      line-height: 1.1;
    }

    .dash-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }

    /* セクションナビゲーション */
    .section-selector {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 2.5rem;
      padding: 0.5rem;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      backdrop-filter: blur(12px);
    }

    .selector-tab {
      flex: 1;
      min-width: 160px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 0.8rem 1rem;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.9rem;
      transition: var(--transition-smooth);
      text-align: center;
    }

    .selector-tab:hover {
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.03);
    }

    .selector-tab.active {
      color: #0f172a;
      background: var(--color-primary);
      font-weight: 600;
      box-shadow: 0 4px 12px var(--color-primary-glow);
    }
    
    [data-theme="light"] .selector-tab.active {
      color: #ffffff;
      background: var(--color-primary);
    }

    /* メインコンテンツレイアウト */
    .content-area {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
    }

    /* 問題カード */
    .quiz-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow: var(--shadow-premium);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      margin-bottom: 1.5rem;
      transition: var(--transition-smooth);
      position: relative;
      overflow: hidden;
    }

    .quiz-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: var(--color-primary);
      opacity: 0.8;
    }

    .quiz-card.completed::before {
      background: var(--color-success);
    }

    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
    }

    .quiz-badge {
      background: var(--color-primary-glow);
      color: var(--color-primary);
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .quiz-number {
      font-family: var(--font-outfit);
      font-size: 1rem;
      color: var(--text-muted);
    }

    .quiz-question {
      font-size: 1.2rem;
      font-weight: 500;
      line-height: 1.6;
      margin-bottom: 1.75rem;
      color: var(--text-main);
    }

    /* 選択肢オプション */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .option-label {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 1.1rem 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: var(--transition-smooth);
      position: relative;
    }

    .option-label:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .option-radio {
      appearance: none;
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border: 2px solid var(--text-muted);
      border-radius: 50%;
      outline: none;
      transition: var(--transition-smooth);
      position: relative;
      flex-shrink: 0;
    }

    .option-radio:checked {
      border-color: var(--color-primary);
      background: var(--color-primary);
    }

    .option-radio:checked::after {
      content: '';
      position: absolute;
      width: 8px;
      height: 8px;
      background: #0f172a;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .option-text {
      font-size: 1rem;
      line-height: 1.4;
    }

    /* 記述解答入力 */
    .input-container {
      position: relative;
      margin-bottom: 1.5rem;
      max-width: 500px;
    }

    .text-input {
      width: 100%;
      background: rgba(15, 23, 42, 0.4);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      color: var(--text-main);
      font-size: 1.05rem;
      font-family: var(--font-inter);
      outline: none;
      transition: var(--transition-smooth);
    }

    .text-input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 15px var(--color-primary-glow);
      background: rgba(15, 23, 42, 0.6);
    }

    /* アクションエリア */
    .action-row {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    /* フィードバック (正誤表示) */
    .feedback-message {
      display: none;
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      margin-top: 1.5rem;
      animation: fadeIn 0.4s ease-out;
    }

    .feedback-message.correct {
      display: block;
      background: var(--color-success-glow);
      border: 1px solid var(--color-success);
      color: var(--color-success);
    }

    .feedback-message.incorrect {
      display: block;
      background: var(--color-error-glow);
      border: 1px solid var(--color-error);
      color: var(--color-error);
    }

    .feedback-title {
      font-weight: 700;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    /* 解説アコーディオン */
    .explanation-box {
      margin-top: 1rem;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding-top: 1rem;
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--text-main);
    }

    .explanation-box h4 {
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--color-secondary);
    }

    /* コラムや図表の装飾 */
    .diagram-box {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 12px;
      padding: 1rem;
      margin: 0.75rem 0;
      font-family: monospace;
      font-size: 0.9rem;
      overflow-x: auto;
      white-space: pre;
      line-height: 1.5;
    }

    /* 対照表用の特別レイアウト */
    .table-container {
      overflow-x: auto;
      margin: 1.5rem 0;
      border-radius: 12px;
      border: 1px solid var(--card-border);
    }

    .comparison-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 0.95rem;
    }

    .comparison-table th, .comparison-table td {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--card-border);
    }

    .comparison-table th {
      background: rgba(255, 255, 255, 0.05);
      font-weight: 600;
      color: var(--color-primary);
    }

    .comparison-table tr:last-child td {
      border-bottom: none;
    }

    .table-input {
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid var(--card-border);
      border-radius: 6px;
      padding: 0.3rem 0.5rem;
      color: var(--text-main);
      width: 120px;
      font-family: monospace;
      outline: none;
      transition: var(--transition-smooth);
    }

    .table-input:focus {
      border-color: var(--color-primary);
      background: rgba(15, 23, 42, 0.8);
    }

    /* ビジュアル木構造 (2進変換の割り算プロセス用) */
    .tree-step {
      display: flex;
      align-items: center;
      margin-bottom: 0.25rem;
      font-family: monospace;
    }

    .tree-divide {
      color: var(--color-primary);
      margin-right: 0.5rem;
    }

    .tree-rem {
      color: var(--color-secondary);
      margin-left: 1.5rem;
      font-weight: bold;
    }

    /* アニメーション */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* フッター */
    footer {
      text-align: center;
      margin-top: 4rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--card-border);
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    /* 復習モードトグル用 */
    .mode-switch-active {
      border-color: var(--color-secondary) !important;
      box-shadow: 0 0 15px var(--color-secondary-glow);
    }

    /* 画面切り替え時のスムーズ表示 */
    .hidden {
      display: none !important;
    }

    /* モード固有の進行状況表示 */
    .progress-bar-container {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 3px;
      margin-bottom: 2rem;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(to right, var(--color-primary), var(--color-secondary));
      border-radius: 3px;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* レスポンシブ調整 */
    @media (max-width: 768px) {
      body {
        padding: 1rem 0.5rem;
      }
      .quiz-card {
        padding: 1.5rem;
      }
      header {
        flex-direction: column;
        align-items: flex-start;
        gap: 1rem;
      }
      .controls {
        width: 100%;
        justify-content: space-between;
      }
      .selector-tab {
        font-size: 0.8rem;
        padding: 0.6rem;
      }
    }
  </style>
</head>
<body>

  <!-- 背景デコレーション -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <div class="container">
    <!-- ヘッダー -->
    <header>
      <div class="brand">
        <h1>CS & Binary Exercises</h1>
        <p>コンピュータ構成要素・2進法 総合演習システム</p>
      </div>
      <div class="controls">
        <button class="btn" id="themeToggleBtn" onclick="toggleTheme()">
          ☀️ Mode
        </button>
        <button class="btn" id="resetProgressBtn" onclick="resetProgress()">
          🔄 進捗リセット
        </button>
        <button class="btn btn-primary" id="toggleModeBtn" onclick="toggleViewMode()">
          🗂️ 1問ずつ解く
        </button>
      </div>
    </header>

    <!-- ダッシュボード -->
    <section class="dashboard">
      <div class="dash-card">
        <div class="dash-icon">🎯</div>
        <div class="dash-info">
          <div class="dash-value" id="dashTotalCount">0 / 0</div>
          <div class="dash-label">解答済み問題数</div>
        </div>
      </div>
      <div class="dash-card success">
        <div class="dash-icon">📈</div>
        <div class="dash-info">
          <div class="dash-value" id="dashAccuracy">0%</div>
          <div class="dash-label">正答率 (既解答中)</div>
        </div>
      </div>
      <div class="dash-card">
        <div class="dash-icon">⚡</div>
        <div class="dash-info">
          <div class="dash-value" id="dashTotalScore">0</div>
          <div class="dash-label">獲得スコア</div>
        </div>
      </div>
    </section>

    <!-- 進捗バー (1問ずつ解くモード用) -->
    <div class="progress-bar-container hidden" id="cardProgressBarContainer">
      <div class="progress-bar" id="cardProgressBar"></div>
    </div>

    <!-- カテゴリタブセレクター -->
    <div class="section-selector" id="sectionSelector">
      <button class="selector-tab active" onclick="switchCategory('all')">全範囲</button>
      <button class="selector-tab" onclick="switchCategory('basic')">1. コンピュータ構成要素</button>
      <button class="selector-tab" onclick="switchCategory('conversion')">2. n進法の基礎・変換</button>
      <button class="selector-tab" onclick="switchCategory('operation')">3. 2進数の加減乗除</button>
      <button class="selector-tab" onclick="switchCategory('complement')">4. 補数表記と整数</button>
    </div>

    <!-- 問題リストエリア -->
    <main class="content-area" id="quizContainer">
      <!-- JavaScriptで動的生成 -->
    </main>

    <!-- 1問ずつモード用のナビゲーション -->
    <div class="action-row hidden" id="cardNavRow" style="justify-content: space-between; margin-bottom: 2rem;">
      <button class="btn" id="prevCardBtn" onclick="navigateCard(-1)">◀ 前の問題</button>
      <span style="align-self: center; font-weight: 500;" id="cardPositionIndicator">1 / 10</span>
      <button class="btn" id="nextCardBtn" onclick="navigateCard(1)">次の問題 ▶</button>
    </div>

    <!-- フッター -->
    <footer>
      <p>© 2026 情報Ⅰ 学習サポートシステム | 範囲: コンピュータ解説書(p.1-p.33) & 2進法演習問題1</p>
    </footer>
  </div>

  <script>
    // 演習問題データベース (全38問)
    const quizDatabase = [
      // === カテゴリ1: コンピュータの構成要素と装置 ===
      {
        id: "q1",
        category: "basic",
        type: "choice",
        question: "コンピュータを構成する物理的な機械や電子回路である「ハードウェア」に対し、それを動作させるプログラムやデータの集まりを何と呼びますか？",
        options: ["オペレーティングシステム (OS)", "アプリケーションソフト", "ソフトウェア", "データベース"],
        answer: "ソフトウェア",
        explanation: "コンピュータは、物理的な実体である「ハードウェア」と、コンピュータに指示を与えるプログラムやデータである「ソフトウェア」が組み合わさって初めて動作します。"
      },
      {
        id: "q2",
        category: "basic",
        type: "choice",
        question: "ソフトウェアは大きく2つに分類されます。キーボードやマウスなどのハードウェアを制御し、基本機能を提供するソフトウェアを何と呼びますか？",

      // 対照表問題も含めるため、filteredQuestions.length + 1が上限（補数カテゴリにいる場合のみ対照表を末尾に追加）
      let totalItems = filteredQuestions.length;

    // 回答の正規化関数 (入力表記の揺れを吸収する)
    function normalizeAnswerString(str) {
      if (!str) return "";
      
      // 全角英数字を半角に変換
      let norm = str.replace(/[Ａ-Ｚａ-ｚ０-９]/g, function(s) {
        return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
      });
      
      // 全角カンマ・スペースの統一と除去
      norm = norm.replace(/，/g, ",").replace(/\s+/g, "").toLowerCase();
      
      // 2進数・10進数・16進数の基数文字の除去
      norm = norm.replace(/\((2|10|16|2進数|10進数|16進数|２|１０|１６)\)$/, "");
      norm = norm.replace(/_(2|10|16)$/, "");
      norm = norm.replace(/2進数$/, "").replace(/10進数$/, "").replace(/16進数$/, "");
      
      // 16進数のプレフィックス「0x」「h」などの除去
      norm = norm.replace(/^0x/, "");
      norm = norm.replace(/h$/, "");

      return norm;
    }

    // 記述式部分一致・キーワードマッチ判定
    function checkKeywordMatch(userAns, keywords) {
      const normUser = userAns.toLowerCase();
      return keywords.some(keyword => normUser.includes(keyword.toLowerCase()));
    }

    // クイズ表示レンダリング

      if (viewMode === 'list') {
        // リスト形式ですべて表示

          container.appendChild(createQuizCardHTML(q, idx));

        }
      } else {
        // カード形式で1問ずつ表示
        let totalItems = filteredQuestions.length;
        if (showTable) totalItems += 1;
        
        document.getElementById('cardPositionIndicator').textContent = `${currentCardIndex + 1} / ${totalItems}`;
        
        // 進捗バーの更新
        const pct = (currentCardIndex / (totalItems - 1 || 1)) * 100;
        document.getElementById('cardProgressBar').style.width = `${pct}%`;

        if (currentCardIndex < filteredQuestions.length) {
          const q = filteredQuestions[currentCardIndex];
          container.appendChild(createQuizCardHTML(q, currentCardIndex));
        } else if (showTable && currentCardIndex === filteredQuestions.length) {
          container.appendChild(createTableCardHTML());
        }

        // ナビゲーションボタン状態制御
        document.getElementById('prevCardBtn').disabled = currentCardIndex === 0;
        document.getElementById('nextCardBtn').disabled = currentCardIndex === totalItems - 1;
      }
    }

    // 記述式問題でEnterキーを押した時の処理
    function handleInputEnter(event, qId) {
      if (event.key === 'Enter') {
        submitAnswer(qId);
      }
    }

    // 選択肢変更時に一時保存
    let tempSelectedOptions = {};
    function selectOption(qId, val) {
      tempSelectedOptions[qId] = val;
    }

    // 問題の解答を送信・判定
    function submitAnswer(qId) {
      const q = quizDatabase.find(item => item.id === qId);
      if (!q) return;

      let userAnswer = "";
      if (q.type === 'choice') {
        userAnswer = tempSelectedOptions[qId] || "";
        if (!userAnswer) {
          alert("選択肢を選んでください。");
          return;
        }
      } else {
        const input = document.getElementById(`input-${q.id}`);
        userAnswer = input.value.trim();
        if (!userAnswer) {
          alert("解答を入力してください。");
          return;
        }
      }

      // 正誤判定ロジック
      let isCorrect = false;
      const normalizedUser = normalizeAnswerString(userAnswer);
      const normalizedSystem = normalizeAnswerString(q.answer);

      if (q.type === 'choice') {
        isCorrect = normalizedUser === normalizedSystem;
      } else {
        // テキスト入力の判定
        if (q.keywords) {
          isCorrect = checkKeywordMatch(normalizedUser, q.keywords) || normalizedUser === normalizedSystem;
        } else {
          isCorrect = normalizedUser === normalizedSystem;
        }
      }

      // 進捗データの更新
      userProgress.completedAnswers[q.id] = {
        isCorrect: isCorrect,
        userAnswer: userAnswer
      };

      if (isCorrect) {
        userProgress.score += 10;
      }

      saveProgress();
      renderQuiz();
      updateDashboard();
    }

    // 対照表問題の送信・判定
    function submitTableAnswers() {
      const tableKeys = Object.keys(tableAnswers);
      let answersToSave = {};
      let allFilled = true;

      // 値の読み出し
      tableKeys.forEach(k => {
        const input = document.getElementById(`tbl-${k}`);
        if (input) {
          const val = input.value.trim();
          if (!val) allFilled = false;
          answersToSave[k] = val;
        }
      });

      if (!allFilled) {
        alert("対照表のすべての空欄を埋めてください。");
        return;
      }

      // セーブ
      userProgress.tableAnswers = answersToSave;
      
      // スコア計算 (1マス2点)
      let correctCount = 0;
      tableKeys.forEach(k => {
        if (normalizeAnswerString(answersToSave[k]) === normalizeAnswerString(tableAnswers[k])) {
          correctCount++;
        }
      });

      userProgress.score += correctCount * 2;

      saveProgress();
      renderQuiz();
      updateDashboard();
    }

    // ダッシュボード更新
    function updateDashboard() {
      const totalQuestions = quizDatabase.length;
      const completedList = Object.keys(userProgress.completedAnswers);
      const completedCount = completedList.length;

      document.getElementById('dashTotalCount').textContent = `${completedCount} / ${totalQuestions}`;

      // 正答率の計算
      let accuracy = 0;
      if (completedCount > 0) {
        const correctCount = completedList.filter(id => userProgress.completedAnswers[id].isCorrect).length;
        accuracy = Math.round((correctCount / completedCount) * 100);
      }
      document.getElementById('dashAccuracy').textContent = `${accuracy}%`;
      document.getElementById('dashTotalScore').textContent = userProgress.score;
    }

    // ローカルストレージへのセーブ/ロード
    function saveProgress() {
      localStorage.setItem('cs_binary_progress', JSON.stringify(userProgress));
    }

    function loadProgress() {
      const saved = localStorage.getItem('cs_binary_progress');
      if (saved) {
        try {
          userProgress = JSON.parse(saved);
          if (!userProgress.completedAnswers) userProgress.completedAnswers = {};
          if (!userProgress.tableAnswers) userProgress.tableAnswers = {};
          if (userProgress.score === undefined) userProgress.score = 0;
        } catch (e) {
          console.error("進捗データの読み込みエラー", e);
        }
      }
    }

    // 進捗リセット
    function resetProgress() {
      if (confirm("これまでの解答進捗とスコアをリセットしますか？")) {
        userProgress = {
          completedAnswers: {},
          tableAnswers: {},
          score: 0
        };
        tempSelectedOptions = {};
        saveProgress();
        renderQuiz();
        updateDashboard();
      }
    }
  </script>
</body>
</html>
