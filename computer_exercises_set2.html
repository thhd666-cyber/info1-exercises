<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>コンピュータと2進法 演習問題システム (Set 2)</title>
  <!-- Google Fonts: Inter & Outfit & Noto Sans JP -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* CSS変数によるデザインシステム定義 (Set 2: グリーン＆ブルー基調) */
    :root {
      --bg-gradient-start: #061512;
      --bg-gradient-end: #020617;
      --card-bg: rgba(15, 32, 30, 0.75);
      --card-border: rgba(74, 222, 128, 0.1);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      
      --color-primary: #4ade80;       /* エメラルドグリーン */
      --color-primary-glow: rgba(74, 222, 128, 0.25);
      --color-secondary: #38bdf8;     /* ネオンブルー */
      --color-secondary-glow: rgba(56, 189, 248, 0.2);
      --color-success: #22c55e;       /* グリーン */
      --color-success-glow: rgba(34, 197, 94, 0.15);
      --color-error: #f87171;         /* コーラルレッド */
      --color-error-glow: rgba(248, 113, 113, 0.2);
      
      --font-outfit: 'Outfit', 'Noto Sans JP', sans-serif;
      --font-inter: 'Inter', 'Noto Sans JP', sans-serif;
      
      --shadow-premium: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
      --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ライトテーマの上書き */
    [data-theme="light"] {
      --bg-gradient-start: #f0fdf4;
      --bg-gradient-end: #e2e8f0;
      --card-bg: rgba(255, 255, 255, 0.8);
      --card-border: rgba(22, 163, 74, 0.08);
      --text-main: #0f172a;
      --text-muted: #64748b;
      
      --color-primary: #16a34a;
      --color-primary-glow: rgba(22, 163, 74, 0.15);
      --color-secondary: #0284c7;
      --color-secondary-glow: rgba(2, 132, 199, 0.1);
      --color-success: #15803d;
      --color-success-glow: rgba(21, 128, 61, 0.1);
      --color-error: #dc2626;
      --color-error-glow: rgba(220, 38, 38, 0.1);
      
      --shadow-premium: 0 8px 32px 0 rgba(148, 163, 184, 0.15);
    }

    /* 基本リセット & アニメーション背景 */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-main);
      font-family: var(--font-inter);
      min-height: 100vh;
      overflow-x: hidden;
      padding: 2rem 1rem;
      position: relative;
      transition: background 0.5s ease, color 0.3s ease;
    }

    /* 背景の光るオーブ（装飾） */
    .bg-orbs {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.12;
      animation: float 20s infinite alternate ease-in-out;
    }

    .orb-1 {
      width: 400px;
      height: 400px;
      background: var(--color-primary);
      top: -100px;
      right: -100px;
    }

    .orb-2 {
      width: 500px;
      height: 500px;
      background: var(--color-secondary);
      bottom: -150px;
      left: -150px;
      animation-duration: 25s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 50px) scale(1.1); }
    }

    /* コンテナ */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      position: relative;
      z-index: 10;
    }

    /* ヘッダーエリア */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--card-border);
    }

    .brand {
      display: flex;
      flex-direction: column;
    }

    .brand h1 {
      font-family: var(--font-outfit);
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(to right, var(--color-primary), var(--color-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.25rem;
    }

    .brand p {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    /* コントロールボタン群 */
    .controls {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .btn {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text-main);
      padding: 0.6rem 1.2rem;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: var(--transition-smooth);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .btn:hover {
      background: var(--color-primary-glow);
      border-color: var(--color-primary);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px var(--color-primary-glow);
    }

    .btn-primary {
      background: var(--color-primary);
      color: #0f172a;
      border: none;
      font-weight: 600;
    }

    .btn-primary:hover {
      background: #86efac;
      color: #0f172a;
      box-shadow: 0 4px 15px var(--color-primary-glow);
    }

    /* ダッシュボード (進捗状況) */
    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2.5rem;
    }

    .dash-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      box-shadow: var(--shadow-premium);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      transition: var(--transition-smooth);
    }

    .dash-card:hover {
      transform: translateY(-3px);
      border-color: rgba(74, 222, 128, 0.2);
    }

    .dash-icon {
      width: 50px;
      height: 50px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      background: var(--color-primary-glow);
      color: var(--color-primary);
    }

    .dash-card.success .dash-icon {
      background: var(--color-success-glow);
      color: var(--color-success);
    }

    .dash-info {
      display: flex;
      flex-direction: column;
    }

    .dash-value {
      font-family: var(--font-outfit);
      font-size: 1.8rem;
      font-weight: 700;
      line-height: 1.1;
    }

    .dash-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }

    /* セクションナビゲーション */
    .section-selector {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 2.5rem;
      padding: 0.5rem;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      backdrop-filter: blur(12px);
    }

    .selector-tab {
      flex: 1;
      min-width: 160px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 0.8rem 1rem;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.9rem;
      transition: var(--transition-smooth);
      text-align: center;
    }

    .selector-tab:hover {
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.03);
    }

    .selector-tab.active {
      color: #0f172a;
      background: var(--color-primary);
      font-weight: 600;
      box-shadow: 0 4px 12px var(--color-primary-glow);
    }
    
    [data-theme="light"] .selector-tab.active {
      color: #ffffff;
      background: var(--color-primary);
    }

    /* メインコンテンツレイアウト */
    .content-area {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
    }

    /* 問題カード */
    .quiz-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow: var(--shadow-premium);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      margin-bottom: 1.5rem;
      transition: var(--transition-smooth);
      position: relative;
      overflow: hidden;
    }

    .quiz-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: var(--color-primary);
      opacity: 0.8;
    }

    .quiz-card.completed::before {
      background: var(--color-success);
    }

    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
    }

    .quiz-badge {
      background: var(--color-primary-glow);
      color: var(--color-primary);
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .quiz-number {
      font-family: var(--font-outfit);
      font-size: 1rem;
      color: var(--text-muted);
    }

    .quiz-question {
      font-size: 1.2rem;
      font-weight: 500;
      line-height: 1.6;
      margin-bottom: 1.75rem;
      color: var(--text-main);
    }

    /* 選択肢オプション */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .option-label {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 1.1rem 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: var(--transition-smooth);
      position: relative;
    }

    .option-label:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(74, 222, 128, 0.2);
    }

    .option-radio {
      appearance: none;
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border: 2px solid var(--text-muted);
      border-radius: 50%;
      outline: none;
      transition: var(--transition-smooth);
      position: relative;
      flex-shrink: 0;
    }

    .option-radio:checked {
      border-color: var(--color-primary);
      background: var(--color-primary);
    }

    .option-radio:checked::after {
      content: '';
      position: absolute;
      width: 8px;
      height: 8px;
      background: #0f172a;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .option-text {
      font-size: 1rem;
      line-height: 1.4;
    }

    /* 記述解答入力 */
    .input-container {
      position: relative;
      margin-bottom: 1.5rem;
      max-width: 500px;
    }

    .text-input {
      width: 100%;
      background: rgba(15, 23, 42, 0.4);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      color: var(--text-main);
      font-size: 1.05rem;
      font-family: var(--font-inter);
      outline: none;
      transition: var(--transition-smooth);
    }

    .text-input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 15px var(--color-primary-glow);
      background: rgba(15, 23, 42, 0.6);
    }

    /* アクションエリア */
    .action-row {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    /* フィードバック (正誤表示) */
    .feedback-message {
      display: none;
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      margin-top: 1.5rem;
      animation: fadeIn 0.4s ease-out;
    }

    .feedback-message.correct {
      display: block;
      background: var(--color-success-glow);
      border: 1px solid var(--color-success);
      color: var(--color-success);
    }

    .feedback-message.incorrect {
      display: block;
      background: var(--color-error-glow);
      border: 1px solid var(--color-error);
      color: var(--color-error);
    }

    .feedback-title {
      font-weight: 700;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    /* 解説アコーディオン */
    .explanation-box {
      margin-top: 1rem;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding-top: 1rem;
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--text-main);
    }

    .explanation-box h4 {
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--color-secondary);
    }

    /* 対照表用の特別レイアウト */
    .table-container {
      overflow-x: auto;
      margin: 1.5rem 0;
      border-radius: 12px;
      border: 1px solid var(--card-border);
    }

    .comparison-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 0.95rem;
    }

    .comparison-table th, .comparison-table td {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--card-border);
    }

    .comparison-table th {
      background: rgba(255, 255, 255, 0.05);
      font-weight: 600;
      color: var(--color-primary);
    }

    .comparison-table tr:last-child td {
      border-bottom: none;
    }

    .table-input {
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid var(--card-border);
      border-radius: 6px;
      padding: 0.3rem 0.5rem;
      color: var(--text-main);
      width: 120px;
      font-family: monospace;
      outline: none;
      transition: var(--transition-smooth);
    }

    .table-input:focus {
      border-color: var(--color-primary);
      background: rgba(15, 23, 42, 0.8);
    }

    /* アニメーション */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* フッター */
    footer {
      text-align: center;
      margin-top: 4rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--card-border);
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    /* 画面切り替え時のスムーズ表示 */
    .hidden {
      display: none !important;
    }

    /* モード固有の進行状況表示 */
    .progress-bar-container {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 3px;
      margin-bottom: 2rem;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(to right, var(--color-primary), var(--color-secondary));
      border-radius: 3px;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* レスポンシブ調整 */
    @media (max-width: 768px) {
      body {
        padding: 1rem 0.5rem;
      }
      .quiz-card {
        padding: 1.5rem;
      }
      header {
        flex-direction: column;
        align-items: flex-start;
        gap: 1rem;
      }
      .controls {
        width: 100%;
        justify-content: space-between;
      }
      .selector-tab {
        font-size: 0.8rem;
        padding: 0.6rem;
      }
    }
  </style>
</head>
<body>

  <!-- 背景デコレーション -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <div class="container">
    <!-- ヘッダー -->
    <header>
      <div class="brand">
        <h1>CS & Binary Exercises <span style="font-size: 1.2rem; vertical-align: middle; background: var(--color-primary-glow); color: var(--color-primary); padding: 0.2rem 0.6rem; border-radius: 8px; margin-left: 0.5rem;">Set 2</span></h1>
        <p>コンピュータ構成要素・2進法 総合演習システム (別問題版)</p>
      </div>
      <div class="controls">
        <button class="btn" id="themeToggleBtn" onclick="toggleTheme()">
          ☀️ Mode
        </button>
        <button class="btn" id="resetProgressBtn" onclick="resetProgress()">
          🔄 進捗リセット
        </button>
        <button class="btn btn-primary" id="toggleModeBtn" onclick="toggleViewMode()">
          🗂️ 1問ずつ解く
        </button>
      </div>
    </header>

    <!-- ダッシュボード -->
    <section class="dashboard">
      <div class="dash-card">
        <div class="dash-icon">🎯</div>
        <div class="dash-info">
          <div class="dash-value" id="dashTotalCount">0 / 0</div>
          <div class="dash-label">解答済み問題数</div>
        </div>
      </div>
      <div class="dash-card success">
        <div class="dash-icon">📈</div>
        <div class="dash-info">
          <div class="dash-value" id="dashAccuracy">0%</div>
          <div class="dash-label">正答率 (既解答中)</div>
        </div>
      </div>
      <div class="dash-card">
        <div class="dash-icon">⚡</div>
        <div class="dash-info">
          <div class="dash-value" id="dashTotalScore">0</div>
          <div class="dash-label">獲得スコア</div>
        </div>
      </div>
    </section>

    <!-- 進捗バー (1問ずつ解くモード用) -->
    <div class="progress-bar-container hidden" id="cardProgressBarContainer">
      <div class="progress-bar" id="cardProgressBar"></div>
    </div>

    <!-- カテゴリタブセレクター -->
    <div class="section-selector" id="sectionSelector">
      <button class="selector-tab active" onclick="switchCategory('all')">全範囲</button>
      <button class="selector-tab" onclick="switchCategory('basic')">1. コンピュータ構成要素</button>
      <button class="selector-tab" onclick="switchCategory('conversion')">2. n進法の基礎・変換</button>
      <button class="selector-tab" onclick="switchCategory('operation')">3. 2進数の加減乗除</button>
      <button class="selector-tab" onclick="switchCategory('complement')">4. 補数表記と整数</button>
    </div>

    <!-- 問題リストエリア -->
    <main class="content-area" id="quizContainer">
      <!-- JavaScriptで動的生成 -->
    </main>

    <!-- 1問ずつモード用のナビゲーション -->
    <div class="action-row hidden" id="cardNavRow" style="justify-content: space-between; margin-bottom: 2rem;">
      <button class="btn" id="prevCardBtn" onclick="navigateCard(-1)">◀ 前の問題</button>
      <span style="align-self: center; font-weight: 500;" id="cardPositionIndicator">1 / 10</span>
      <button class="btn" id="nextCardBtn" onclick="navigateCard(1)">次の問題 ▶</button>
    </div>

    <!-- フッター -->
    <footer>
      <p>© 2026 情報Ⅰ 学習サポートシステム | Set 2 (範囲: 解説書p.1-p.33 & 2進法演習問題1)</p>
    </footer>
  </div>

  <script>
    // 演習問題データベース (Set 2: 全38問)
    const quizDatabase = [
      // === カテゴリ1: コンピュータの構成要素と装置 ===
      {
        id: "s2_q1",
        category: "basic",
        type: "choice",
        question: "コンピュータにおける「ハードウェア」の定義、あるいは具体例として最も適切なものはどれですか？",
        options: [
          "コンピュータを操作するための取扱説明書やガイドライン",
          "CPU、主記憶装置、キーボード、ディスプレイなどの物理的な機械・部品",
          "オペレーティングシステム (OS) やブラウザなどのソフトウェアプログラム",
          "インターネット上に保存されているユーザーの写真やドキュメントデータ"
        ],
        answer: "CPU、主記憶装置、キーボード、ディスプレイなどの物理的な機械・部品",
        explanation: "ハードウェアは、目で見たり手で触れたりできる「物理的な機械や装置・電子部品」の総称です。プログラムなどの無体の指示情報は「ソフトウェア」と呼びます。"
      },
      {
        id: "s2_q2",
        category: "basic",
        type: "choice",
        question: "ユーザーが特定の目的（文書作成、表計算、写真編集など）を達成するために使用するソフトウェアを何と呼びますか？",
        options: ["基本ソフトウェア (OS)", "デバイスソフトウェア", "アプリケーションソフトウェア", "システムユーティリティ"],
        answer: "アプリケーションソフトウェア",
        explanation: "OSはコンピュータ全体の管理を行う「基本ソフトウェア」、ユーザーが特定の目的をもって直接使うWordやExcel、ブラウザなどは「アプリケーションソフトウェア」に分類されます。"
      },
      {
        id: "s2_q3",
        category: "basic",
        type: "choice",

      const progressBar = document.getElementById('cardProgressBarContainer');
      const navRow = document.getElementById('cardNavRow');
      const selector = document.getElementById('sectionSelector');
      
      if (viewMode === 'card') {
        progressBar.classList.remove('hidden');
        navRow.classList.remove('hidden');
        selector.classList.add('hidden');
        currentCardIndex = 0;
      } else {
        progressBar.classList.add('hidden');
        navRow.classList.add('hidden');
        selector.classList.remove('hidden');
      }
      renderQuiz();
    }

    function switchCategory(cat) {
      currentCategory = cat;
      const tabs = document.querySelectorAll('.selector-tab');
      tabs.forEach(tab => tab.classList.remove('active'));
      
      const activeTab = Array.from(tabs).find(tab => {
        if (cat === 'all') return tab.textContent.includes('全範囲');
        if (cat === 'basic') return tab.textContent.includes('1.');
        if (cat === 'conversion') return tab.textContent.includes('2.');
        if (cat === 'operation') return tab.textContent.includes('3.');
        if (cat === 'complement') return tab.textContent.includes('4.');
      });
      if (activeTab) activeTab.classList.add('active');

      if (cat === 'all') {
        filteredQuestions = [...quizDatabase];
      } else {
        filteredQuestions = quizDatabase.filter(q => q.category === cat);
      }
      
      currentCardIndex = 0;
      renderQuiz();
    }

    function navigateCard(direction) {
      const nextIndex = currentCardIndex + direction;
      let totalItems = filteredQuestions.length;
      const showTable = (currentCategory === 'all' || currentCategory === 'complement');
      if (showTable) totalItems += 1;

      if (nextIndex >= 0 && nextIndex < totalItems) {
        currentCardIndex = nextIndex;
        renderQuiz();
      }
    }

    function normalizeAnswerString(str) {
      if (!str) return "";
      let norm = str.replace(/[Ａ-Ｚａ-ｚ０-９]/g, function(s) {
        return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
      });
      norm = norm.replace(/，/g, ",").replace(/\s+/g, "").toLowerCase();
      norm = norm.replace(/\((2|10|16|2進数|10進数|16進数|２|１０|１６)\)$/, "");
      norm = norm.replace(/_(2|10|16)$/, "");
      norm = norm.replace(/2進数$/, "").replace(/10進数$/, "").replace(/16進数$/, "");
      norm = norm.replace(/^0x/, "");
      norm = norm.replace(/h$/, "");
      return norm;
    }

    function checkKeywordMatch(userAns, keywords) {
      const normUser = userAns.toLowerCase();
      return keywords.some(keyword => normUser.includes(keyword.toLowerCase()));
    }

    function renderQuiz() {
      const container = document.getElementById('quizContainer');
      container.innerHTML = '';
      const showTable = (currentCategory === 'all' || currentCategory === 'complement');

      if (viewMode === 'list') {
        filteredQuestions.forEach((q, idx) => {
          container.appendChild(createQuizCardHTML(q, idx));
        });
        if (showTable) {
          container.appendChild(createTableCardHTML());
        }
      } else {
        let totalItems = filteredQuestions.length;
        if (showTable) totalItems += 1;
        
        document.getElementById('cardPositionIndicator').textContent = `${currentCardIndex + 1} / ${totalItems}`;
        
        const pct = (currentCardIndex / (totalItems - 1 || 1)) * 100;
        document.getElementById('cardProgressBar').style.width = `${pct}%`;

        if (currentCardIndex < filteredQuestions.length) {
          const q = filteredQuestions[currentCardIndex];
          container.appendChild(createQuizCardHTML(q, currentCardIndex));
        } else if (showTable && currentCardIndex === filteredQuestions.length) {
          container.appendChild(createTableCardHTML());
        }

        document.getElementById('prevCardBtn').disabled = currentCardIndex === 0;
        document.getElementById('nextCardBtn').disabled = currentCardIndex === totalItems - 1;
      }
    }

    function createQuizCardHTML(q, displayIdx) {
      const card = document.createElement('div');
      card.className = 'quiz-card';
      card.id = `card-${q.id}`;
      
      const isCompleted = userProgress.completedAnswers[q.id];
      if (isCompleted) {
        card.classList.add('completed');
      }

      let catName = "基礎知識";
      if (q.category === "conversion") catName = "n進法変換";
      if (q.category === "operation") catName = "2進数演算";
      if (q.category === "complement") catName = "補数表記";

      let optionsHTML = '';
      if (q.type === 'choice') {
        optionsHTML = `<div class="options-grid">`;
        q.options.forEach((opt, oIdx) => {
          const optId = `opt-${q.id}-${oIdx}`;
          const checked = isCompleted && userProgress.completedAnswers[q.id].userAnswer === opt ? 'checked' : '';
          const disabled = isCompleted ? 'disabled' : '';
          optionsHTML += `
            <label class="option-label" for="${optId}">
              <input type="radio" name="name-${q.id}" id="${optId}" class="option-radio" value="${opt}" ${checked} ${disabled} onchange="selectOption('${q.id}', '${opt}')">
              <span class="option-text">${opt}</span>
            </label>
          `;
        });
        optionsHTML += `</div>`;
      } else {
        const userVal = isCompleted ? userProgress.completedAnswers[q.id].userAnswer : '';
        const disabled = isCompleted ? 'disabled' : '';
        optionsHTML = `
          <div class="input-container">
            <input type="text" id="input-${q.id}" class="text-input" placeholder="解答を入力してください" value="${userVal}" ${disabled} onkeypress="handleInputEnter(event, '${q.id}')">
          </div>
        `;
      }

      let actionHTML = '';
      if (!isCompleted) {
        actionHTML = `
          <div class="action-row">
            <button class="btn btn-primary" onclick="submitAnswer('${q.id}')">解答する</button>
          </div>
        `;
      }

      let feedbackHTML = '';
      if (isCompleted) {
        const isCorrect = userProgress.completedAnswers[q.id].isCorrect;
        const statusClass = isCorrect ? 'correct' : 'incorrect';
        const titleText = isCorrect ? '🎉 正解です！' : '❌ 不正解です';
        feedbackHTML = `
          <div class="feedback-message ${statusClass}">
            <div class="feedback-title">${titleText}</div>
            <div>あなたの解答: <b>${userProgress.completedAnswers[q.id].userAnswer}</b></div>
            ${!isCorrect ? `<div>正しい解答: <b>${q.answer}</b></div>` : ''}
            <div class="explanation-box">
              <h4>💡 解説</h4>
              <p>${q.explanation}</p>
            </div>
          </div>
        `;
      }

      card.innerHTML = `
        <div class="quiz-header">
          <span class="quiz-badge">${catName}</span>
          <span class="quiz-number">問題 ${displayIdx + 1}</span>
        </div>
        <div class="quiz-question">${q.question}</div>
        ${optionsHTML}
        ${actionHTML}
        ${feedbackHTML}
      `;

      return card;
    }

    function createTableCardHTML() {
      const card = document.createElement('div');
      card.className = 'quiz-card';
      card.id = 'card-table-exercise';

      const tableKeys = Object.keys(tableAnswers);
      const allDone = tableKeys.every(k => userProgress.tableAnswers[k] !== undefined);
      if (allDone) {
        card.classList.add('completed');
      }

      const getCellHTML = (id, label) => {
        const userVal = userProgress.tableAnswers[id] || '';
        const disabled = allDone ? 'disabled' : '';
        const isCorrect = allDone && normalizeAnswerString(userVal) === normalizeAnswerString(tableAnswers[id]);
        const style = allDone ? (isCorrect ? 'border-color: var(--color-success); color: var(--color-success);' : 'border-color: var(--color-error); color: var(--color-error);') : '';
        return `<input type="text" id="tbl-${id}" class="table-input" style="${style}" value="${userVal}" placeholder="${label}" ${disabled}>`;
      };

      let actionHTML = '';
      if (!allDone) {
        actionHTML = `
          <div class="action-row">
            <button class="btn btn-primary" onclick="submitTableAnswers()">対照表を判定する</button>
          </div>
        `;
      }

      let feedbackHTML = '';
      if (allDone) {
        let correctCount = 0;
        tableKeys.forEach(k => {
          if (normalizeAnswerString(userProgress.tableAnswers[k]) === normalizeAnswerString(tableAnswers[k])) {
            correctCount++;
          }
        });
        const isPerfect = correctCount === tableKeys.length;
        const statusClass = isPerfect ? 'correct' : 'incorrect';
        const titleText = isPerfect ? '🎉 対照表 完全制覇！' : `⚠️ 判定結果 (${correctCount} / ${tableKeys.length} 正解)`;
        
        feedbackHTML = `
          <div class="feedback-message ${statusClass}">
            <div class="feedback-title">${titleText}</div>
            <div class="explanation-box">
              <h4>💡 対照表の解説</h4>
              <p>8ビットの2の補数表現では、最上位ビット（左端）が「符号ビット」となります。0は正の数、1は負の数です。</p>
              <ul>
                <li><b>正の数（0以上）:</b> 00000000(0) から 01111111(127) まで、通常の2進数とまったく同じ表現になります。</li>
                <li><b>負の数:</b> 正の値を全ビット反転し、1を加えることで作られます。例えば -1 は、1(00000001) を反転して 11111110、1を加えて <b>11111111</b> になります。</li>
                <li><b>限界値:</b> 負の最小値は 10000000(2) = <b>-128</b> となり、これはビット反転＋1の手順では作れず、表の端に位置する限界の負数です。</li>
              </ul>
            </div>
          </div>
        `;
      }

      card.innerHTML = `
        <div class="quiz-header">
          <span class="quiz-badge">補数表記</span>
          <span class="quiz-number">特別演習</span>
        </div>
        <div class="quiz-question">
          <b>10進数と 8ビット2進数（2の補数表記）の対照表を完成させなさい。</b>
          <p style="font-size: 0.9rem; color: var(--text-muted); margin-top: 0.5rem;">解説書p.28の表に基づき、空欄に8桁の2進数（半角）を入力してください。</p>
        </div>
        
        <div class="table-container">
          <table class="comparison-table">
            <thead>
              <tr>
                <th>10進数</th>
                <th>2進数 (8ビット補数表記)</th>
                <th style="border-left: 1px solid var(--card-border);">10進数</th>
                <th>2進数 (8ビット補数表記)</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>127</td>
                <td>01111111</td>
                <td style="border-left: 1px solid var(--card-border);">-1</td>
                <td>${getCellHTML('tm1', '11111111')}</td>
              </tr>
              <tr>
                <td>64</td>
                <td>${getCellHTML('t64', '01000000')}</td>
                <td style="border-left: 1px solid var(--card-border);">-2</td>
                <td>${getCellHTML('tm2', '11111110')}</td>
              </tr>
              <tr>
                <td>32</td>
                <td>${getCellHTML('t32', '00100000')}</td>
                <td style="border-left: 1px solid var(--card-border);">-4</td>
                <td>${getCellHTML('tm4', '11111100')}</td>
              </tr>
              <tr>
                <td>16</td>
                <td>${getCellHTML('t16', '00010000')}</td>
                <td style="border-left: 1px solid var(--card-border);">-8</td>
                <td>${getCellHTML('tm8', '11111000')}</td>
              </tr>
              <tr>
                <td>8</td>
                <td>${getCellHTML('t8', '00001000')}</td>
                <td style="border-left: 1px solid var(--card-border);">-16</td>
                <td>${getCellHTML('tm16', '11110000')}</td>
              </tr>
              <tr>
                <td>4</td>
                <td>${getCellHTML('t4', '00000100')}</td>
                <td style="border-left: 1px solid var(--card-border);">-32</td>
                <td>${getCellHTML('tm32', '11100000')}</td>
              </tr>
              <tr>
                <td>2</td>
                <td>${getCellHTML('t2', '00000010')}</td>
                <td style="border-left: 1px solid var(--card-border);">-64</td>
                <td>${getCellHTML('tm64', '11000000')}</td>
              </tr>
              <tr>
                <td>1</td>
                <td>${getCellHTML('t1', '00000001')}</td>
                <td style="border-left: 1px solid var(--card-border);">-128</td>
                <td>${getCellHTML('tm128', '10000000')}</td>
              </tr>
              <tr>
                <td>0</td>
                <td>00000000</td>
                <td style="border-left: 1px solid var(--card-border);">-</td>
                <td style="color: var(--text-muted); font-size: 0.8rem;">(全17マス)</td>
              </tr>
            </tbody>
          </table>
        </div>
        ${actionHTML}
        ${feedbackHTML}
      `;

      return card;
    }

    function handleInputEnter(event, qId) {
      if (event.key === 'Enter') {
        submitAnswer(qId);
      }
    }

    let tempSelectedOptions = {};
    function selectOption(qId, val) {
      tempSelectedOptions[qId] = val;
    }

    function submitAnswer(qId) {
      const q = quizDatabase.find(item => item.id === qId);
      if (!q) return;

      let userAnswer = "";
      if (q.type === 'choice') {
        userAnswer = tempSelectedOptions[qId] || "";
        if (!userAnswer) {
          alert("選択肢を選んでください。");
          return;
        }
      } else {
        const input = document.getElementById(`input-${q.id}`);
        userAnswer = input.value.trim();
        if (!userAnswer) {
          alert("解答を入力してください。");
          return;
        }
      }

      let isCorrect = false;
      const normalizedUser = normalizeAnswerString(userAnswer);
      const normalizedSystem = normalizeAnswerString(q.answer);

      if (q.type === 'choice') {
        isCorrect = normalizedUser === normalizedSystem;
      } else {
        if (q.keywords) {
          isCorrect = checkKeywordMatch(normalizedUser, q.keywords) || normalizedUser === normalizedSystem;
        } else {
          isCorrect = normalizedUser === normalizedSystem;
        }
      }

      userProgress.completedAnswers[q.id] = {
        isCorrect: isCorrect,
        userAnswer: userAnswer
      };

      if (isCorrect) {
        userProgress.score += 10;
      }

      saveProgress();
      renderQuiz();
      updateDashboard();
    }

    function submitTableAnswers() {
      const tableKeys = Object.keys(tableAnswers);
      let answersToSave = {};
      let allFilled = true;

      tableKeys.forEach(k => {
        const input = document.getElementById(`tbl-${k}`);
        if (input) {
          const val = input.value.trim();
          if (!val) allFilled = false;
          answersToSave[k] = val;
        }
      });

      if (!allFilled) {
        alert("対照表のすべての空欄を埋めてください。");
        return;
      }

      userProgress.tableAnswers = answersToSave;
      
      let correctCount = 0;
      tableKeys.forEach(k => {
        if (normalizeAnswerString(answersToSave[k]) === normalizeAnswerString(tableAnswers[k])) {
          correctCount++;
        }
      });

      userProgress.score += correctCount * 2;

      saveProgress();
      renderQuiz();
      updateDashboard();
    }

    function updateDashboard() {
      const totalQuestions = quizDatabase.length;
      const completedList = Object.keys(userProgress.completedAnswers);
      const completedCount = completedList.length;

      document.getElementById('dashTotalCount').textContent = `${completedCount} / ${totalQuestions}`;

      let accuracy = 0;
      if (completedCount > 0) {
        const correctCount = completedList.filter(id => userProgress.completedAnswers[id].isCorrect).length;
        accuracy = Math.round((correctCount / completedCount) * 100);
      }
      document.getElementById('dashAccuracy').textContent = `${accuracy}%`;
      document.getElementById('dashTotalScore').textContent = userProgress.score;
    }

    function saveProgress() {
      localStorage.setItem('cs_binary_progress_s2', JSON.stringify(userProgress));
    }

    function loadProgress() {
      const saved = localStorage.getItem('cs_binary_progress_s2');
      if (saved) {
        try {
          userProgress = JSON.parse(saved);
          if (!userProgress.completedAnswers) userProgress.completedAnswers = {};
          if (!userProgress.tableAnswers) userProgress.tableAnswers = {};
          if (userProgress.score === undefined) userProgress.score = 0;
        } catch (e) {
          console.error("進捗データの読み込みエラー", e);
        }
      }
    }

    function resetProgress() {
      if (confirm("これまでの解答進捗とスコアをリセットしますか？")) {
        userProgress = {
          completedAnswers: {},
          tableAnswers: {},
          score: 0
        };
        tempSelectedOptions = {};
        saveProgress();
        renderQuiz();
        updateDashboard();
      }
    }
  </script>
</body>
</html>
