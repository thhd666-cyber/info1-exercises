<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>コンピュータと2進法 演習問題ポータル</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-gradient-start: #0f172a;
      --bg-gradient-end: #020617;
      --card-bg: rgba(30, 41, 59, 0.6);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      
      --color-blue: #38bdf8;
      --color-green: #4ade80;
      
      --font-outfit: 'Outfit', 'Noto Sans JP', sans-serif;
      --font-inter: 'Inter', 'Noto Sans JP', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-main);
      font-family: var(--font-inter);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
      position: relative;
    }

    /* 装飾用背景オーブ */
    .orbs {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.12;
    }

    .orb-1 {
      width: 450px;
      height: 450px;
      background: var(--color-blue);
      top: -150px;
      left: -100px;
    }

    .orb-2 {
      width: 500px;
      height: 500px;
      background: var(--color-green);
      bottom: -150px;
      right: -100px;
    }

    .container {
      max-width: 900px;
      width: 100%;
      z-index: 10;
      text-align: center;
    }

    header {
      margin-bottom: 3.5rem;
    }

    header h1 {
      font-family: var(--font-outfit);
      font-size: 2.8rem;
      font-weight: 700;
      background: linear-gradient(to right, var(--color-blue), var(--color-green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    header p {
      color: var(--text-muted);
      font-size: 1.1rem;
      font-weight: 300;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2rem;
      margin-bottom: 3rem;
    }

    .portal-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 2.5rem;
      text-decoration: none;
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      position: relative;
      overflow: hidden;
    }

    .portal-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      transition: all 0.3s ease;
    }

    .portal-card.set-1::before {
      background: var(--color-blue);
    }

    .portal-card.set-2::before {
      background: var(--color-green);
    }

    .portal-card:hover {
      transform: translateY(-8px);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .portal-card.set-1:hover {
      box-shadow: 0 12px 30px rgba(56, 189, 248, 0.15);
    }

    .portal-card.set-2:hover {
      box-shadow: 0 12px 30px rgba(74, 222, 128, 0.15);
    }

    .card-icon {
      font-size: 3rem;
      margin-bottom: 1.5rem;
      background: rgba(255, 255, 255, 0.03);
      width: 80px;
      height: 80px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.3s ease;
    }

    .portal-card.set-1 .card-icon {
      color: var(--color-blue);
    }

    .portal-card.set-2 .card-icon {
      color: var(--color-green);
    }

    .portal-card:hover .card-icon {
      transform: scale(1.1);
      background: rgba(255, 255, 255, 0.08);
    }

    .card-title {
      font-family: var(--font-outfit);
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }

    .card-desc {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 2rem;
      flex-grow: 1;
    }

    .card-btn {
      padding: 0.75rem 2rem;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      color: #0f172a;
      transition: all 0.3s ease;
      width: 100%;
    }

    .portal-card.set-1 .card-btn {
      background: var(--color-blue);
    }

    .portal-card.set-2 .card-btn {
      background: var(--color-green);
    }

    .portal-card.set-1:hover .card-btn {
      background: #7dd3fc;
      box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);
    }

    .portal-card.set-2:hover .card-btn {
      background: #86efac;
      box-shadow: 0 4px 15px rgba(74, 222, 128, 0.4);
    }

    footer {
      color: var(--text-muted);
      font-size: 0.85rem;
      border-top: 1px solid var(--card-border);
      padding-top: 1.5rem;
      margin-top: 2rem;
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 2.2rem;
      }
      .cards-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <div class="orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <div class="container">
    <header>
      <h1>Binary & CS Exercises</h1>
      <p>コンピュータ構成要素・2進法 演習問題ポータルサイト</p>
    </header>

    <div class="cards-grid">
      <!-- Set 1 Card -->
      <a href="computer_exercises.html" class="portal-card set-1">
        <div class="card-icon">🔵</div>
        <div class="card-title">演習問題 Set 1</div>
        <div class="card-desc">
          コンピュータ解説書(p.1-p.33)および演習問題1の全範囲を網羅した基本問題セットです。（全38問）
        </div>
        <div class="card-btn">開始する</div>
      </a>

      <!-- Set 2 Card -->
      <a href="computer_exercises_set2.html" class="portal-card set-2">
        <div class="card-icon">🟢</div>
        <div class="card-title">演習問題 Set 2</div>
        <div class="card-desc">
          Set 1と同等の出題範囲で、数値や問いかけのバリエーションを変えた模擬試験用問題セットです。（全38問）
        </div>
        <div class="card-btn">開始する</div>
      </a>
    </div>

    <footer>
      <p>© 2026 情報Ⅰ 学習サポートシステム | 範囲: コンピュータ解説書(p.1-p.33) & 2進法演習問題1</p>
    </footer>
  </div>

</body>
</html>
